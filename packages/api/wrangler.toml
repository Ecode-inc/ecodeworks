name = "ecode-internal-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "ecode-db"
database_id = "placeholder-change-me"

[[r2_buckets]]
binding = "FILES"
bucket_name = "ecode-files"

[durable_objects]
bindings = [
  { name = "WEBSOCKET_ROOM", class_name = "WebSocketRoom" }
]

[[migrations]]
tag = "v1"
new_classes = ["WebSocketRoom"]
